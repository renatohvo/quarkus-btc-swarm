  server:
    http_listen_port: 8888
    grpc_listen_port: 0

  positions:
    filename: /run/promtail/positions.yml

  clients:
    - url: http://loki:3100/loki/api/v1/push

  scrape_configs:
    - job_name: caddy
      static_configs:
        - targets:
            - localhost
          labels:
            job: caddylogs
            __path__: /var/log/caddy/*.log
